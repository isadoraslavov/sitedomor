<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner - Criar Conta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="register-form">
            <h1>Criar Conta</h1>
            <p>Cadastre-se para usar o Planner</p>
            
            <input type="text" placeholder="Nome Completo" required>
            <input type="email" placeholder="E-mail Corporativo" required>
            <input type="password" placeholder="Crie uma Senha" required>
            <input type="password" placeholder="Confirme a Senha" required>
            
            <button type="submit">Cadastrar</button>
            
            <div class="form-footer">
                <a href="index.html">Já tenho conta? Entrar</a>
            </div>
        </form>
    </div>
    <script>
        // Lógica simples para voltar ao login após cadastrar
        document.getElementById('register-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Conta criada com sucesso! (Simulação)");
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
