<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner - Recuperar Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="recover-form">
            <h1>Recuperar Senha</h1>
            <p>Digite seu e-mail para receber as instruções.</p>
            
            <input type="email" placeholder="Seu e-mail cadastrado" required>
            
            <button type="submit">Enviar Link de Recuperação</button>
            
            <div class="form-footer">
                <a href="index.html">Voltar para o Login</a>
            </div>
        </form>
    </div>
    <script>
        document.getElementById('recover-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Se o e-mail existir, você receberá um link em breve!");
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
