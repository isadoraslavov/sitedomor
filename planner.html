<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Planner - Agenda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <span>Planner Corporativo | <strong>Bacharelando</strong></span>
        <button class="btn-logout" onclick="location.href='index.html'">Sair</button>
    </nav>

    <div class="planner-layout">
        <aside class="sidebar">
            <section class="task-input-section">
                <h3>Novo Compromisso</h3>
                <input type="text" id="task-name" placeholder="Título da reunião">
                <input type="time" id="task-time" min="08:00" max="17:00">
                <button onclick="addTask()">Agendar no Horário</button>
            </section>

            <section class="stats-cards">
                <div class="card">
                    <h4 id="total-count">0</h4>
                    <p>Total</p>
                </div>
                <div class="card">
                    <h4 id="pending-count">0</h4>
                    <p>Faltam</p>
                </div>
            </section>
        </aside>

        <main class="agenda-view">
            <h2>Agenda do Dia</h2>
            <div id="planner-grid">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
