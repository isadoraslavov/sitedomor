<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Ademicon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="corpo-vermelho">

    <!-- TELA 1: LOGIN (Aparece primeiro) -->
    <div id="tela-login" class="secao-auth">
        <div class="card-login">
            <img src="https://logodownload.org/wp-content/uploads/2019/08/ademicon-logo.png" alt="Ademicon" class="logo-site" onerror="this.style.display='none'">
            <h1>Acesso ao Planner</h1>
            <input type="email" id="email-login" placeholder="Seu e-mail">
            <input type="password" id="senha-login" placeholder="Sua senha">
            <button onclick="fazerLogin()" id="btn-entrar">Entrar</button>
            <p id="erro-auth" class="txt-erro"></p>
        </div>
    </div>

    <!-- TELA 2: DASHBOARD (Escondida até logar) -->
    <div id="tela-dashboard" class="hidden">
        <nav class="navbar">
            <span class="marca">Ademicon | <strong>Bacharelando</strong></span>
            <div class="menu">
                <button onclick="trocarAba('agendar')">Agendar</button>
                <button onclick="trocarAba('agenda-view')">Ver Agenda</button>
                <button onclick="deslogar()" class="btn-sair">Sair</button>
            </div>
        </nav>

        <!-- Aba Agendar -->
        <div id="aba-agendar" class="aba-conteudo container">
            <h2>Novo Compromisso</h2>
            <form id="form-agendar">
                <input type="text" id="nome-tarefa" placeholder="Título da tarefa" required>
                <input type="time" id="horario-tarefa" required>
                <button type="submit" id="btn-salvar">Salvar e Notificar</button>
            </form>
            <p id="status-envio"></p>
        </div>

        <!-- Aba Ver Agenda -->
        <div id="aba-agenda-view" class="aba-conteudo hidden">
            <div class="layout-agenda">
                <div class="resumo">
                    <div class="card-mini">
                        <h3 id="contador-total">0</h3>
                        <p>Tarefas</p>
                    </div>
                </div>
                <div class="lista-container">
                    <h2>Sua Agenda do Dia</h2>
                    <div id="grid-tarefas"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
