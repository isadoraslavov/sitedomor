<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Ademicon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <span>Planner Corporativo | <strong>Bacharelando</strong></span>
        <div class="nav-links">
            <button onclick="mostrarPagina('agendar')">Agendar</button>
            <button onclick="mostrarPagina('agenda-view')">Ver Agenda</button>
        </div>
    </nav>

    <!-- PÁGINA DE AGENDAMENTO -->
    <div id="pag-agendar" class="container active">
        <h1>Agendar Tarefa</h1>
        <form id="form-planner">
            <input type="text" id="nome-tarefa" placeholder="O que precisa ser feito?" required>
            <input type="time" id="horario-tarefa" required>
            <button type="submit" id="btn-salvar">Agendar e Avisar</button>
        </form>
        <p id="mensagem-status"></p>
    </div>

    <!-- PÁGINA DE VISUALIZAÇÃO (AGENDA) -->
    <div id="pag-agenda-view" class="planner-layout hidden">
        <aside class="sidebar">
            <section class="stats-cards">
                <div class="card">
                    <h4 id="total-count">0</h4>
                    <p>Total</p>
                </div>
                <div class="card">
                    <h4 id="pending-count">0</h4>
                    <p>Pendentes</p>
                </div>
            </section>
        </aside>

        <main class="agenda-view">
            <h2>Agenda do Dia</h2>
            <div id="planner-grid">
                <!-- As tarefas aparecerão aqui -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
