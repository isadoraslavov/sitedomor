<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Ademicon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="corpo-vermelho">

    <!-- LOGIN / CADASTRO -->
    <section id="auth-section" class="flex-center">
        <div id="card-login" class="card">
            <h1 class="marca">Login Planner</h1>
            <input type="email" id="email-login" placeholder="E-mail">
            <input type="password" id="senha-login" placeholder="Senha">
            <button class="btn-main" id="btn-entrar">Acessar Sistema</button>
            <div class="opcoes"><span onclick="toggleCards('cadastro')">Criar Conta</span></div>
        </div>

        <div id="card-cadastro" class="card hidden">
            <h1 class="marca">Nova Conta</h1>
            <input type="email" id="email-cad" placeholder="Seu e-mail">
            <input type="password" id="senha-cad" placeholder="Senha">
            <button class="btn-main" id="btn-cadastrar">Cadastrar</button>
            <span class="link-voltar" onclick="toggleCards('login')">Voltar</span>
        </div>
    </section>

    <!-- DASHBOARD PRINCIPAL -->
    <main id="dash-section" class="hidden">
        <nav class="navbar">
            <span class="logo">Ademicon | <strong>Bacharelando</strong></span>
            <div class="nav-btns">
                <button onclick="aba('agendar')">Novo</button>
                <button onclick="aba('lista')">Planner</button>
                <button onclick="deslogar()" class="btn-sair">Sair</button>
            </div>
        </nav>

        <!-- ABA AGENDAR -->
        <div id="aba-agendar" class="view">
            <div class="box">
                <h2>Agendar Tarefa</h2>
                <input type="text" id="task-title" placeholder="O que fazer?">
                <input type="date" id="task-date">
                <input type="time" id="task-hour">
                <button class="btn-main" id="btn-salvar">Salvar e Notificar</button>
            </div>
        </div>

        <!-- ABA PLANNER (CALENDÁRIO + GRADE) -->
        <div id="aba-lista" class="view hidden">
            <div class="planner-container">
                <!-- Lado Esquerdo: Calendário -->
                <div class="calendario-col">
                    <div class="cal-nav">
                        <button onclick="mudarMes(-1)">❮</button>
                        <h3 id="mes-nome">Maio 2026</h3>
                        <button onclick="mudarMes(1)">❯</button>
                    </div>
                    <div class="dias-semana">
                        <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
                    </div>
                    <div id="cal-grid" class="cal-grid"></div>
                </div>

                <!-- Lado Direito: Grade de Horários -->
                <div class="grade-col">
                    <h2 id="titulo-dia">Selecione um dia</h2>
                    <div id="grade-corpo"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
