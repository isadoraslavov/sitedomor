<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Ademicon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SEÇÃO DE AUTENTICAÇÃO -->
    <div id="sessao-auth" class="tela-cheia-vermelha">
        
        <!-- CARD LOGIN -->
        <div id="card-login" class="card-branco">
            <h1 class="texto-vermelho">Login Planner</h1>
            <input type="email" id="email-login" placeholder="E-mail">
            <input type="password" id="senha-login" placeholder="Senha">
            <button onclick="executarLogin()" class="btn-vermelho">Entrar</button>
            <div class="links-auth">
                <p onclick="trocarAuth('cadastro')">Criar Conta</p>
                <p onclick="trocarAuth('recuperar')">Esqueci a Senha</p>
            </div>
            <p id="msg-login" class="status-msg"></p>
        </div>

        <!-- CARD CADASTRO -->
        <div id="card-cadastro" class="card-branco hidden">
            <h1 class="texto-vermelho">Nova Conta</h1>
            <input type="email" id="email-cadastro" placeholder="E-mail">
            <input type="password" id="senha-cadastro" placeholder="Senha (min. 6 caracteres)">
            <button onclick="executarCadastro()" class="btn-vermelho">Cadastrar</button>
            <p onclick="trocarAuth('login')" class="link-voltar">Voltar ao Login</p>
            <p id="msg-cadastro" class="status-msg"></p>
        </div>

    </div>

    <!-- DASHBOARD (ESCONDIDO) -->
    <div id="tela-dashboard" class="hidden">
        <nav class="nav-ademicon">
            <span>Ademicon | <strong>Bacharelando</strong></span>
            <div class="nav-group">
                <button onclick="mudarAba('agendar')">Agendar</button>
                <button onclick="mudarAba('agenda')">Agenda</button>
                <button onclick="sair()" class="btn-outline">Sair</button>
            </div>
        </nav>

        <div id="aba-agendar" class="aba-container">
            <div class="form-box">
                <h2>Novo Compromisso</h2>
                <form id="form-tarefa">
                    <input type="text" id="t-nome" placeholder="Título" required>
                    <input type="time" id="t-hora" required>
                    <button type="submit" class="btn-vermelho">Salvar e Notificar</button>
                </form>
                <p id="msg-tarefa"></p>
            </div>
        </div>

        <div id="aba-agenda" class="aba-container hidden">
            <div class="lista-box">
                <h2>Minhas Tarefas</h2>
                <div id="grid-tarefas"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
