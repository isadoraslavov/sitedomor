<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Ademicon</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar (Escondida até logar) -->
    <nav id="main-nav" class="navbar hidden">
        <span>Planner Corporativo | <strong>Bacharelando</strong></span>
        <div class="nav-links">
            <button onclick="mostrarPagina('agendar')">Agendar</button>
            <button onclick="mostrarPagina('agenda-view')">Ver Agenda</button>
            <button onclick="logout()" class="btn-sair">Sair</button>
        </div>
    </nav>

    <!-- 1. TELA DE LOGIN (A que sumiu!) -->
    <div id="pag-login" class="container">
        <h1>Entrar no Planner</h1>
        <div class="form-auth">
            <input type="email" id="login-email" placeholder="Seu e-mail" required>
            <input type="password" id="login-senha" placeholder="Sua senha" required>
            <button id="btn-entrar" onclick="login()">Acessar Conta</button>
            <p onclick="cadastrar()" class="link-alt">Não tem conta? Cadastre-se</p>
        </div>
        <p id="auth-status"></p>
    </div>

    <!-- 2. TELA DE AGENDAMENTO (Escondida) -->
    <div id="pag-agendar" class="container hidden">
        <h1>Agendar Tarefa</h1>
        <form id="form-planner">
            <input type="text" id="nome-tarefa" placeholder="O que precisa ser feito?" required>
            <input type="time" id="horario-tarefa" required>
            <button type="submit" id="btn-salvar">Agendar e Avisar</button>
        </form>
        <p id="mensagem-status"></p>
    </div>

    <!-- 3. TELA DE AGENDA (Escondida) -->
    <div id="pag-agenda-view" class="planner-layout hidden">
        <aside class="sidebar">
            <div class="card">
                <h4 id="total-count">0</h4>
                <p>Total de Tarefas</p>
            </div>
        </aside>
        <main class="agenda-view">
            <h2>Minha Agenda</h2>
            <div id="planner-grid"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
